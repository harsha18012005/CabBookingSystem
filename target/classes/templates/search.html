<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layout (~{::body})">
<body>
<div th:fragment="content">
    <h2>Search Available Cabs</h2>
    <form method="get" action="/available">
        <input name="city" placeholder="City e.g. Hyderabad" th:value="${city}">
        <button type="submit">Search</button>
    </form>
    <div th:if="${cabs}">
        <h3 th:text="'Available in ' + ${city}"></h3>
        <table>
            <tr><th>Reg No</th><th>Model</th><th>Driver</th><th>Status</th></tr>
            <tr th:each="c : ${cabs}">
                <td th:text="${c.registrationNo}"></td>
                <td th:text="${c.model}"></td>
                <td th:text="${c.driver != null ? c.driver.name : '—'}"></td>
                <td th:text="${c.status}"></td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
